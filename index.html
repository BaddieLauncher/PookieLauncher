<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Pookie Launcher | Rai Daim Pro</title>
<style>
    :root { --primary: #ff1493; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.95); --admin: #9b59b6; }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: #000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    
    #game-container { position: relative; width: 360px; height: 640px; background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 0 50px rgba(255, 20, 147, 0.4); }
    canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; }
    #weather-canvas { pointer-events: none; z-index: 5; }

    .overlay { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index: 50; background: var(--card); backdrop-filter: blur(10px); text-align: center; }
    input { margin:8px 0; padding:12px; border-radius:12px; border: 2px solid var(--primary); width:75%; outline: none; text-align: center; font-weight: bold; }
    .btn { background: var(--primary); color: white; border:none; padding:12px 30px; font-weight:700; border-radius:50px; cursor:pointer; font-size:14px; margin-top: 8px; width: 80%; transition: 0.2s; text-transform: uppercase; }
    .btn:active { transform: scale(0.95); }
    
    #hud { position: absolute; top: 30px; width: 100%; display: none; justify-content: space-between; z-index: 10; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
    
    /* Leaderboard Style */
    #lb-box { width: 85%; background: #f8f9fa; padding: 10px; border-radius: 15px; margin-top: 15px; border: 1px solid #ddd; max-height: 120px; overflow-y: auto; }
    .lb-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #eee; }

    /* Admin Panel */
    #adminPanel { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; background: white; padding: 20px; border-radius: 25px; z-index: 200; border: 3px solid var(--admin); box-shadow: 0 0 100px rgba(0,0,0,0.5); }
    
    #chat-box { position: absolute; bottom: 85px; right: 15px; width: 220px; height: 200px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 60; border: 1px solid #ddd; }
    #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; }

    .lobby-badge { background: var(--primary); color: white; padding: 15px; border-radius: 15px; font-size: 24px; font-weight: 900; margin: 15px 0; letter-spacing: 5px; }
</style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="scoreDisplay" style="font-size: 30px; font-weight: 900; color: white; text-shadow: 2px 2px #ff1493;">0</div>
        <div id="coinDisplay" style="font-size: 30px; font-weight: 900; color: gold; text-shadow: 2px 2px #000;">0</div>
    </div>

    <canvas id="game"></canvas>
    <canvas id="weather-canvas"></canvas>

    <div id="loginPage" class="overlay">
        <h1 style="color:var(--primary); margin:0;">POOKIE</h1>
        <input id="uIn" type="text" placeholder="Enter Nickname">
        <button class="btn" onclick="login()">Enter Arena</button>
    </div>

    <div id="startMenu" class="overlay" style="display:none;">
        <div id="adminBtn" onclick="openAdmin()" style="display:none; position:absolute; top:20px; left:20px; color:var(--admin); cursor:pointer; font-weight:bold; font-size:20px;">👑</div>
        <h2 style="color:#f1c40f; margin:5px;">💰 <span id="totalCoins">0</span></h2>
        
        <div style="display:flex; align-items:center; gap:15px; margin: 10px;">
            <button onclick="changeChar(-1)" style="font-size:30px; background:none; border:none; color:var(--primary);">◀</button>
            <img id="charAvatar" src="" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--primary); background:#fff;">
            <button onclick="changeChar(1)" style="font-size:30px; background:none; border:none; color:var(--primary);">▶</button>
        </div>

        <button class="btn" onclick="startGame()">Solo Play</button>
        <button class="btn" onclick="openMultiMenu()" style="background:#3498db">Multiplayer</button>
        
        <div id="lb-box"><div id="leaderboardList"></div></div>
        <div onclick="logout()" style="margin-top:10px; color:#999; font-size:11px; cursor:pointer;">LOGOUT</div>
    </div>

    <div id="multiMenu" class="overlay" style="display:none;">
        <h2 style="color:var(--primary)">MULTIPLAYER</h2>
        <input id="roomIn" type="text" placeholder="Enter Room Code">
        <button class="btn" onclick="joinRoomAction()" style="background:#2ecc71">Join Room</button>
        <button class="btn" onclick="createRoomAction()" style="background:#f39c12">Create Room</button>
        <button class="btn" onclick="showMenu()" style="background:#999">Back</button>
    </div>

    <div id="roomLobby" class="overlay" style="display:none;">
        <h3 style="margin:0">ROOM LOBBY</h3>
        <div class="lobby-badge" id="displayRoomCode">0000</div>
        <p id="playerCount" style="font-size:12px; font-weight:bold;">Players: 1</p>
        
        <button class="btn" id="startBtn" onclick="hostStartGame()" style="background:#2ecc71; display:none;">START GAME</button>
        <button class="btn" onclick="shareRoom()" style="background:#25D366">Share to WhatsApp</button>
        <button class="btn" onclick="leaveRoom()" style="background:#e74c3c">Leave</button>
        
        <p id="waitMsg" style="font-size:11px; color:#666; margin-top:10px;">Waiting for host to start...</p>
    </div>

    <div id="chat-box">
        <div id="chat-msgs"></div>
        <div style="display:flex; border-top:1px solid #eee; padding:5px;">
            <input id="cIn" placeholder="Chat..." style="flex:1; border:none; font-size:11px;">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; border-radius:5px; padding:5px;">🚀</button>
        </div>
    </div>

    <button onclick="toggleChat()" style="position:absolute; bottom:25px; right:25px; z-index:60; background:var(--primary); color:white; width:50px; height:50px; border-radius:50%; border:none; font-size:25px;">💬</button>
</div>

<div id="adminPanel">
    <h3 style="text-align:center; color:var(--admin); margin:0;">MASTER PANEL</h3>
    <hr>
    <button class="btn" style="background:#3498db; font-size:10px;" onclick="setWeather('rain')">RAIN</button>
    <button class="btn" style="background:#f1c40f; font-size:10px;" onclick="setWeather('coins')">COINFALL</button>
    <button class="btn" style="background:#e74c3c; font-size:10px;" onclick="setWeather('none')">CLEAR</button>
    <input id="gMsgIn" type="text" placeholder="Global Alert Message">
    <button class="btn" onclick="sendGlobalMsg()" style="background:red">Push Alert</button>
    <button class="btn" onclick="closeAdmin()" style="background:#333">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, get, query, orderByChild, limitToLast, onDisconnect, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const conf = { apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc", databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com" };
const app = initializeApp(conf); const db = getDatabase(app);
const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 640;

const bgMusic = new Audio('https://files.catbox.moe/vpt03v.mp3'); bgMusic.loop = true;
const jumpSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

let currentRoom = null; let isHost = false; let others = {};
const assets = { 
    chars: ["https://i.ibb.co/4nZsqPZn/IMG-20260403-WA0258-removebg-preview.png","https://i.ibb.co/KcbN4WFM/IMG-20260403-WA0256-removebg-preview.png","https://i.ibb.co/zV9QR1R1/IMG-20260403-WA0257-removebg-preview.png","https://i.ibb.co/3yQFCm0W/IMG-20260403-WA0259-removebg-preview.png","https://i.ibb.co/XZT4pj5r/1775227244228-removebg-preview.png"], 
    bg: "https://i.ibb.co/PsXKrn2S/1775227599134.png", 
    coin: "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png" 
};

let birdImg = new Image(); let bgImg = new Image(); bgImg.src = assets.bg; let coinImg = new Image(); coinImg.src = assets.coin;
let st = { active: false, dead: false, score: 0, frame: 0, bX: 0, bird: { x: 80, y: 300, v: 0, g: 0.25 }, pipes: [], gameCoins: [], charIndex: 0 };

const MY_NAME = "Rai Daim";

// Login
window.login = () => {
    const n = document.getElementById('uIn').value.trim();
    if(n.length > 1) { localStorage.setItem('pUser', n); showMenu(); }
};

window.logout = () => { localStorage.removeItem('pUser'); location.reload(); };

window.showMenu = () => {
    document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none');
    document.getElementById('startMenu').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    
    const u = localStorage.getItem('pUser');
    if(u === MY_NAME) document.getElementById('adminBtn').style.display = 'block';

    onValue(ref(db, `users/${u.replace(/\W/g,'')}/coins`), s => {
        document.getElementById('totalCoins').innerText = s.val() || 0;
        document.getElementById('coinDisplay').innerText = s.val() || 0;
    });
    syncLB(); updateCharUI();
};

// Multiplayer Logic
window.openMultiMenu = () => {
    document.getElementById('startMenu').style.display = 'none';
    document.getElementById('multiMenu').style.display = 'flex';
};

window.createRoomAction = () => {
    const code = Math.floor(1000 + Math.random() * 9000);
    isHost = true;
    joinRoom(code);
};

window.joinRoomAction = () => {
    const code = document.getElementById('roomIn').value;
    if(code.length < 2) return alert("Valid code daalein!");
    isHost = false;
    joinRoom(code);
};

function joinRoom(code) {
    currentRoom = code;
    const uName = localStorage.getItem('pUser');
    const uKey = uName.replace(/\W/g,'');
    
    document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none');
    document.getElementById('roomLobby').style.display = 'flex';
    document.getElementById('displayRoomCode').innerText = code;
    
    // Lobby UI based on Host/Player
    document.getElementById('startBtn').style.display = isHost ? 'block' : 'none';
    document.getElementById('waitMsg').style.display = isHost ? 'none' : 'block';

    const roomRef = ref(db, `rooms/${code}`);
    const pRef = ref(db, `rooms/${code}/players/${uKey}`);
    
    // Create room status if Host
    if(isHost) set(ref(db, `rooms/${code}/status`), "waiting");

    set(pRef, { name: uName, y: 300, char: st.charIndex });
    onDisconnect(pRef).remove();

    // Listen for Player Count & Game Start
    onValue(ref(db, `rooms/${code}/players`), s => {
        const players = s.val() || {};
        others = players;
        document.getElementById('playerCount').innerText = `Players: ${Object.keys(players).length}`;
    });

    onValue(ref(db, `rooms/${code}/status`), s => {
        if(s.val() === "playing") startGame();
    });
}

window.hostStartGame = () => {
    if(isHost) set(ref(db, `rooms/${currentRoom}/status`), "playing");
};

window.shareRoom = () => {
    const code = document.getElementById('displayRoomCode').innerText;
    const text = `Pookie Launcher join karo! Room Code: ${code}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
};

window.leaveRoom = () => {
    if(currentRoom) remove(ref(db, `rooms/${currentRoom}/players/${localStorage.getItem('pUser').replace(/\W/g,'')}`));
    showMenu();
};

window.startGame = () => {
    document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none');
    document.getElementById('hud').style.display = 'flex';
    birdImg.src = assets.chars[st.charIndex];
    st = { ...st, active: true, dead: false, score: 0, frame: 0, pipes: [], gameCoins: [], bird: { x: 80, y: 300, v: 0, g: 0.25 } };
    loop();
};

function loop() {
    if(!st.active) return;
    ctx.clearRect(0,0,360,640);
    st.bX -= 1.5; ctx.drawImage(bgImg, st.bX, 0, 360, 640); ctx.drawImage(bgImg, st.bX+360, 0, 360, 640); if(st.bX<=-360) st.bX=0;

    if(!st.dead) {
        st.bird.v += st.bird.g; st.bird.y += st.bird.v;
        if(st.frame % 100 === 0) {
            let py = Math.random() * 250 + 100;
            st.pipes.push({ x: 360, y: py, passed: false });
            if(Math.random() > 0.6) st.gameCoins.push({ x: 380, y: py + 75, collected: false });
        }
        if(currentRoom) set(ref(db, `rooms/${currentRoom}/players/${localStorage.getItem('pUser').replace(/\W/g,'')}/y`), st.bird.y);
    }

    // Multiplayer Birds (Ghost)
    const myId = localStorage.getItem('pUser').replace(/\W/g,'');
    for(let id in others) {
        if(id !== myId) {
            let p = others[id];
            ctx.globalAlpha = 0.4;
            let gImg = new Image(); gImg.src = assets.chars[p.char];
            ctx.drawImage(gImg, 80-20, p.y-20, 40, 40);
            ctx.globalAlpha = 1.0;
        }
    }

    // My Bird
    ctx.drawImage(birdImg, st.bird.x-25, st.bird.y-25, 50, 50);

    // Pipes & Coins Logic
    st.pipes.forEach((p, i) => {
        if(!st.dead) p.x -= 2.5;
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(p.x, 0, 52, p.y);
        ctx.fillRect(p.x, p.y + 180, 52, 640);
        if(!st.dead && st.bird.x+15 > p.x && st.bird.x-15 < p.x+52 && (st.bird.y-15 < p.y || st.bird.y+15 > p.y+180)) die();
        if(!p.passed && p.x < st.bird.x) { p.passed=true; st.score++; document.getElementById('scoreDisplay').innerText = st.score; }
        if(p.x < -60) st.pipes.splice(i, 1);
    });

    st.gameCoins.forEach((c, i) => {
        if(!st.dead) c.x -= 2.5;
        if(!c.collected) {
            ctx.drawImage(coinImg, c.x, c.y, 30, 30);
            if(Math.hypot(st.bird.x - (c.x+15), st.bird.y - (c.y+15)) < 30) { c.collected = true; addCoin(); }
        }
    });

    if(!st.dead && (st.bird.y > 640 || st.bird.y < 0)) die();
    if(!st.dead) st.frame++;
    requestAnimationFrame(loop);
}

function die() {
    if(st.dead) return; st.dead = true;
    if(currentRoom) remove(ref(db, `rooms/${currentRoom}/players/${localStorage.getItem('pUser').replace(/\W/g,'')}`));
    setTimeout(() => { st.active = false; showMenu(); }, 1200);
}

function addCoin() {
    const u = localStorage.getItem('pUser').replace(/\W/g,'');
    get(ref(db, `users/${u}/coins`)).then(s => set(ref(db, `users/${u}/coins`), (s.val()||0)+5));
}

// UI Helpers
window.toggleChat = () => { const c = document.getElementById('chat-box'); c.style.display = c.style.display==='flex'?'none':'flex'; };
window.sendMsg = () => {
    const i = document.getElementById('cIn');
    if(i.value) push(ref(db, 'globalChat'), { u: localStorage.getItem('pUser'), m: i.value });
    i.value = '';
};
onValue(query(ref(db, 'globalChat'), limitToLast(10)), s => {
    const l = document.getElementById('chat-msgs'); l.innerHTML = '';
    s.forEach(x => { const d = x.val(); l.innerHTML += `<div><b>${d.u}:</b> ${d.m}</div>`; });
    l.scrollTop = l.scrollHeight;
});

function syncLB() {
    onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(10)), s => {
        let h = '<b style="color:var(--primary); font-size:12px;">🏆 LEADERBOARD</b>';
        let arr = []; s.forEach(x => arr.push({n: x.key, c: x.val().coins}));
        arr.reverse().forEach((p, i) => h += `<div class="lb-row"><span>${i+1}. ${p.n}</span><b>${p.c||0}</b></div>`);
        document.getElementById('leaderboardList').innerHTML = h;
    });
}

window.openAdmin = () => document.getElementById('adminPanel').style.display='block';
window.closeAdmin = () => document.getElementById('adminPanel').style.display='none';
window.changeChar = (dir) => { st.charIndex = (st.charIndex + dir + assets.chars.length) % assets.chars.length; updateCharUI(); };
function updateCharUI() { document.getElementById('charAvatar').src = assets.chars[st.charIndex]; }

// Controls
const jump = () => { if(st.active && !st.dead) st.bird.v = -5.5; if(bgMusic.paused) bgMusic.play(); };
window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') jump(); });
window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') jump(); });

if(localStorage.getItem('pUser')) showMenu();
</script>
</body>
</html>

<style>
    :root { --primary: #ff1493; --bg: #fdf2f5; --card: rgba(255, 255, 255, 0.9); --admin: #9b59b6; }

    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    /* ABUSE EFFECTS */
    .earthquake { animation: shake 0.1s infinite !important; }
    @keyframes shake { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }
    .drunk-mode { filter: blur(6px) hue-rotate(120deg) !important; animation: drunk 3s infinite ease-in-out; }
    @keyframes drunk { 0%, 100% { transform: scale(1.1) rotate(-4deg); } 50% { transform: scale(0.95) rotate(4deg); } }

    .overlay { position:absolute; width:360px; height:640px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:24px; z-index: 50; background: var(--card); backdrop-filter: blur(10px); }

    /* CHAT */
    #chat-box { position: absolute; bottom: 85px; right: 20px; width: 250px; height: 220px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 60; border: 1px solid #ddd; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
    #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; line-height: 1.4; }

    .admin-card { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; text-align: center; }
    .admin-btn { background: var(--admin); color: white; padding: 8px; width: 45%; border: none; border-radius: 6px; margin: 2px; cursor: pointer; font-size: 11px; font-weight: bold; }
    
    /* LEADERBOARD UI */
    #lb-container { width: 85%; background: white; padding: 10px; border-radius: 15px; margin-top: 15px; border: 1px solid #eee; max-height: 160px; overflow-y: auto; }
    .lb-row { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #f1f1f1; font-size: 12px; }

    .shop-icon { position: absolute; bottom: 25px; left: 25px; z-index: 60; background: #FFD700; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, serverTimestamp, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const conf = { apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc", databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com" };
const app = initializeApp(conf); const db = getDatabase(app);
const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d');
const wCanvas = document.getElementById('weather-canvas'); const wCtx = wCanvas.getContext('2d');
canvas.width = 360; canvas.height = 640; wCanvas.width = 360; wCanvas.height = 640;

const dieSnd = new Audio('https://files.catbox.moe/tkzhsm.wav');
const jumpSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

let particles = []; let weatherMode = 'none';
const assets = { chars: ["https://i.ibb.co/4nZsqPZn/IMG-20260403-WA0258-removebg-preview.png","https://i.ibb.co/KcbN4WFM/IMG-20260403-WA0256-removebg-preview.png","https://i.ibb.co/zV9QR1R1/IMG-20260403-WA0257-removebg-preview.png","https://i.ibb.co/3yQFCm0W/IMG-20260403-WA0259-removebg-preview.png","https://i.ibb.co/XZT4pj5r/1775227244228-removebg-preview.png"], bg: "https://i.ibb.co/PsXKrn2S/1775227599134.png", coin: "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png" };
let birdImg = new Image(); let bgImg = new Image(); bgImg.src = assets.bg; let coinImg = new Image(); coinImg.src = assets.coin;
let st = { active: false, dead: false, score: 0, coins: 0, frame: 0, bX: 0, bird: { x: 80, y: 300, v: 0, g: 0.25 }, pipes: [], charIndex: 0 };
const MY_NAME = "Rai Daim";

// WEATHER & PARTICLES
function updateWeather() {
    wCtx.clearRect(0,0,360,640);
    if(weatherMode !== 'none' && Math.random() < 0.2) particles.push({ x: Math.random()*360, y: -20, speed: weatherMode==='rain'?10:2, type: weatherMode });
    particles.forEach((p, i) => {
        p.y += p.speed;
        if(p.type === 'rain') { wCtx.strokeStyle='#3498db'; wCtx.beginPath(); wCtx.moveTo(p.x, p.y); wCtx.lineTo(p.x, p.y+10); wCtx.stroke(); }
        else if(p.type === 'snow') { wCtx.fillStyle='white'; wCtx.beginPath(); wCtx.arc(p.x, p.y, 3, 0, 7); wCtx.fill(); }
        else if(p.type === 'coins') { wCtx.drawImage(coinImg, p.x, p.y, 22, 22); }
        if(p.y > 640) particles.splice(i, 1);
    });
    requestAnimationFrame(updateWeather);
}
updateWeather();

// FIREBASE LISTENERS
onValue(ref(db, 'events/weather'), s => weatherMode = s.val() || 'none');
onValue(ref(db, 'events/msg'), s => {
    if(s.val()){ 
        const m = document.getElementById('globalMsg'); m.innerText = s.val(); 
        m.style.display = 'block'; setTimeout(() => m.style.display='none', 5000);
    }
});
onValue(ref(db, 'events/abuse'), s => {
    const d = s.val(); if(!d) return;
    canvas.classList.remove('drunk-mode', 'earthquake');
    if(d.type === 'drunk') canvas.classList.add('drunk-mode');
    else if(d.type === 'shake') canvas.classList.add('earthquake');
    else if(d.type === 'ban' && localStorage.getItem('pUser') !== MY_NAME) { alert("⚠️ ACCOUNT BANNED BY ADMIN!"); location.reload(); }
    else if(d.type === 'clear') { canvas.classList.remove('drunk-mode', 'earthquake'); }
});
onValue(ref(db, 'events/music'), s => { if(s.val()) new Audio(s.val()).play().catch(e=>{}); });

// ADMIN ACTIONS
window.setWeather = (m) => set(ref(db, 'events/weather'), m);
window.setAbuse = (t) => set(ref(db, 'events/abuse'), { type: t, t: Date.now() });
window.sendGlobalMsg = () => set(ref(db, 'events/msg'), document.getElementById('gMsgIn').value);
window.playMus = () => set(ref(db, 'events/music'), document.getElementById('musUrl').value);
window.setBalance = () => {
    const n = document.getElementById('targetN').value.replace(/\W/g, '');
    const a = parseInt(document.getElementById('targetC').value);
    set(ref(db, 'users/'+n+'/coins'), a).then(()=>alert("Coins Updated!"));
};

// GAME LOGIC
window.login = () => { const n = document.getElementById('uIn').value.trim(); if(n.length>1){ localStorage.setItem('pUser', n); showMenu(); } };
window.showMenu = () => {
    const u = localStorage.getItem('pUser'); if(!u) return;
    document.getElementById('loginPage').style.display='none'; document.getElementById('startMenu').style.display='flex';
    if(u === MY_NAME) document.getElementById('adminBtn').style.display='block';
    onValue(ref(db, 'users/'+u.replace(/\W/g, '')+'/coins'), s => document.getElementById('totalCoins').innerText = s.val()||0);
    syncLB(); updateCharUI();
};
window.startGame = () => {
    document.getElementById('startMenu').style.display='none'; document.getElementById('hud').style.display='flex';
    birdImg.src = assets.chars[st.charIndex];
    st = { ...st, active: true, dead: false, score: 0, frame: 0, pipes: [] };
    loop();
};

function loop() {
    if(!st.active) return; ctx.clearRect(0,0,360,640);
    st.bX -= 2; ctx.drawImage(bgImg, st.bX, 0, 360, 640); ctx.drawImage(bgImg, st.bX+360, 0, 360, 640); if(st.bX<=-360) st.bX=0;
    if(!st.dead) {
        st.bird.v += st.bird.g; st.bird.y += st.bird.v;
        if(st.frame%90===0) st.pipes.push({x:360, y:Math.random()*250+100, passed:false});
    }
    st.pipes.forEach((p, i) => { 
        p.x -= 3; ctx.fillStyle="#2ecc71"; ctx.fillRect(p.x,0,55,p.y); ctx.fillRect(p.x,p.y+180,55,640); 
        if(!st.dead && st.bird.x+15>p.x && st.bird.x-15<p.x+55 && (st.bird.y-15<p.y || st.bird.y+15>p.y+180)) die();
        if(!p.passed && p.x < st.bird.x) { p.passed=true; st.score++; document.getElementById('scoreDisplay').innerText = st.score; }
        if(p.x < -60) st.pipes.splice(i, 1);
    });
    ctx.drawImage(birdImg, st.bird.x-25, st.bird.y-25, 50, 50);
    if(!st.dead && (st.bird.y>640 || st.bird.y<0)) die();
    st.frame++; requestAnimationFrame(loop);
}

function die() { 
    if(st.dead) return; st.dead = true; dieSnd.play();
    const u = localStorage.getItem('pUser').replace(/\W/g, ''); 
    get(ref(db, 'users/'+u+'/coins')).then(s => set(ref(db, 'users/'+u+'/coins'), (s.val()||0)+st.score)); 
    setTimeout(() => { st.active=false; showMenu(); document.getElementById('hud').style.display='none'; }, 1500); 
}

// LEADERBOARD SYNC
function syncLB() {
    const lbRef = query(ref(db, 'users'), orderByChild('coins'), limitToLast(10));
    onValue(lbRef, (s) => {
        let l = document.getElementById('leaderboardList');
        l.innerHTML = '<div style="text-align:center; font-weight:bold; color:var(--primary); font-size:12px; margin-bottom:5px;">🏆 LEADERBOARD</div>';
        let players = []; s.forEach(x => { players.push(x.val()); });
        players.reverse().forEach((p, i) => {
            l.innerHTML += `<div class="lb-row"><span>${i+1}. ${p.name}</span><b>💰 ${p.coins||0}</b></div>`;
        });
    });
}

// CHAT & MODALS
window.toggleChat = () => { const c = document.getElementById('chat-box'); c.style.display = (c.style.display==='flex'?'none':'flex'); };
window.sendMsg = () => { const i = document.getElementById('cIn'); if(i.value) push(ref(db,'chat'),{u:localStorage.getItem('pUser'),m:i.value}); i.value=''; };
onValue(query(ref(db,'chat'), limitToLast(12)), s => {
    const l = document.getElementById('chat-msgs'); l.innerHTML = '';
    s.forEach(x => { const d=x.val(); l.innerHTML += `<div><b style="color:var(--primary)">${d.u}:</b> ${d.m}</div>`; });
    l.scrollTop = l.scrollHeight;
});

window.openAdmin = () => document.getElementById('adminPanel').style.display='block';
window.closeAdmin = () => document.getElementById('adminPanel').style.display='none';
window.addEventListener('mousedown', (e) => { if(st.active && !st.dead && !e.target.closest('#adminPanel')) { st.bird.v = -6; jumpSnd.currentTime=0; jumpSnd.play(); } });
window.changeChar = (dir) => { st.charIndex = (st.charIndex + dir + assets.chars.length) % assets.chars.length; updateCharUI(); };
function updateCharUI() { document.getElementById('charAvatar').src = assets.chars[st.charIndex]; }

if(localStorage.getItem('pUser')) showMenu();
</script>
</body>

import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast, push, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc",

let birdImg = new Image(); birdImg.src = assets.chars[0];
let bgImg = new Image(); bgImg.src = assets.bg;

let state = {
    active: false, dead: false, score: 0, coinsInRun: 0, frame: 0, bgX: 0, speed: 3.2,

const ADMIN_NAME = "Rai Daim";

function playSfx(id) {
    const s = document.getElementById(id);
    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
}

window.login = function() {
    const name = document.getElementById('username').value.trim();

        document.getElementById('totalCoinsMenu').innerText = val;

onValue(query(ref(db, 'chat'), limitToLast(15)), (snap) => {
    const list = document.getElementById('chat-messages');
    list.innerHTML = '';
    snap.forEach(child => {
        const m = child.val();
        const div = document.createElement('div');
        div.className = `msg ${m.isAdmin ? 'msg-admin' : ''}`;
        div.innerHTML = `<span class="msg-tag" style="color:${m.isAdmin?'var(--admin)':'var(--primary)'}">${m.isAdmin?'👑':''} ${m.user}:</span> ${m.msg}`;
        list.appendChild(div);

});

// Admin Control Logic
window.openAdmin = () => document.getElementById('adminPanel').style.display = 'block';
window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

window.adminGiveCoins = () => {
    const target = document.getElementById('targetUser').value.replace(/\W/g, '');
    const amt = parseInt(document.getElementById('coinAmount').value);
    if(!target || isNaN(amt)) return;
    const userRef = ref(db, 'users/' + target + '/coins');
    onValue(userRef, (s) => {
        update(ref(db, 'users/' + target), { coins: (s.val() || 0) + amt });
    }, {onlyOnce: true});
    alert("Sent " + amt + " coins to " + target);
};

window.adminAnnounce = () => {
    const msg = document.getElementById('announcementMsg').value;
    set(ref(db, 'global_event/announcement'), { text: msg, time: Date.now() });
};

window.adminDJ = () => {
    const url = document.getElementById('djUrl').value;
    set(ref(db, 'global_event/dj'), { url, time: Date.now() });
};

window.adminCoinRain = () => {
    set(ref(db, 'global_event/rain'), { active: true, time: Date.now() });
};

// Listening for Admin Events
onValue(ref(db, 'global_event/announcement'), (s) => {
    const data = s.val();
    if(data && Date.now() - data.time < 5000) alert("📢 ALERT: " + data.text);
});

onValue(ref(db, 'global_event/dj'), (s) => {
    const data = s.val();
    if(data && Date.now() - data.time < 5000) {
        const audio = new Audio(data.url);
        audio.play().catch(()=>{});
        canvas.classList.add('shake-active');
        setTimeout(() => canvas.classList.remove('shake-active'), 8000);
    }
});

onValue(ref(db, 'global_event/rain'), (s) => {
    const data = s.val();
    if(data && state.active) state.isRain = true;
});

// Main Loop
function loop() {
    if(!state.active) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    state.bgX -= state.speed * 0.4; if(state.bgX <= -canvas.width) state.bgX = 0;
    ctx.drawImage(bgImg, state.bgX, 0, canvas.width, canvas.height);
    ctx.drawImage(bgImg, state.bgX + canvas.width, 0, canvas.width, canvas.height);

    if(!state.dead) {
        state.bird.v += state.bird.g; state.bird.y += state.bird.v;
        if(state.frame % 90 === 0) {
            const h = Math.random() * (canvas.height - 400) + 100;
            state.pipes.push({ x: canvas.width, y: h, w: 75, gap: 195, passed: false });
            state.coins.push({ x: canvas.width + 120, y: h + 100, collected: false });
        }
        if(state.isRain && state.frame % 10 === 0) state.coins.push({ x: Math.random()*canvas.width, y: -20, collected: false, rain: true });
    }

    state.pipes.forEach(p => {
        p.x -= state.speed; 
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, 0, p.w, p.y); ctx.fillRect(p.x, p.y + 195, p.w, canvas.height);
        if(!state.dead && state.bird.x+18 > p.x && state.bird.x-18 < p.x+p.w) {
            if(state.bird.y-18 < p.y || state.bird.y+18 > p.y+195) triggerDie();
        }
        if(!p.passed && p.x + p.w < state.bird.x) { p.passed = true; state.score++; document.getElementById('scoreDisplay').innerText = state.score; playSfx('audPoint'); }
    });

    state.coins.forEach(c => {
        if(c.rain) c.y += 6; else c.x -= state.speed;
        if(!c.collected) {
            ctx.drawImage(coinImg, c.x-17, c.y-17, 35, 35);
            if(Math.hypot(state.bird.x - c.x, state.bird.y - c.y) < 38) {
                c.collected = true; state.coinsInRun += 5;
                document.getElementById('coinDisplay').innerText = state.coinsInRun;
                playSfx('audPoint');
            }
        }
    });

    ctx.save(); ctx.translate(state.bird.x, state.bird.y); 
    ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, state.bird.v * 0.1)));
    ctx.drawImage(birdImg, -state.bird.w/2, -state.bird.h/2, state.bird.w, state.bird.h);
    ctx.restore();

    if(!state.dead && (state.bird.y > canvas.height || state.bird.y < 0)) triggerDie();
    state.frame++; requestAnimationFrame(loop);
}

function triggerDie() {
    if(state.dead) return; state.dead = true;
    playSfx('audHit'); setTimeout(() => playSfx('audScream'), 300);
    const user = localStorage.getItem('pookie_user').replace(/\W/g, '');
    const total = parseInt(localStorage.getItem('pookie_total_coins') || 0);
    update(ref(db, 'users/' + user), { coins: total + state.coinsInRun });
    setTimeout(() => { state.active = false; state.isRain = false; showMenu(); document.getElementById('hud').style.display = 'none'; }, 1500);
}

function jump() { if(state.active && !state.dead) { state.bird.v = state.bird.jump; playSfx('audJump'); } }
canvas.addEventListener('touchstart', e => { jump(); e.preventDefault(); }, {passive: false});
window.addEventListener('mousedown', () => { if(state.active) jump(); });

function syncLeaderboard() {
    onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(5)), (s) => {
        const list = document.getElementById('leaderboardList');
        list.innerHTML = '';
        let items = [];
        s.forEach(c => { items.push(c.val()); });
        items.reverse().forEach((u, i) => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:3px; border-bottom:1px solid rgba(0,0,0,0.05)"><span>${i+1}. ${u.name}</span><span>💰 ${u.coins}</span></div>`;
        });
    });
}

// Init Chars
assets.chars.forEach((src, i) => {
    const box = document.createElement('div');
    box.className = `char-box ${i===0?'selected':''}`;
    box.onclick = () => {
        birdImg.src = assets.chars[i];
        document.querySelectorAll('.char-box').forEach(b => b.classList.remove('selected'));
        box.classList.add('selected');
        playSfx('audJump');
    };
    box.innerHTML = `<img src="${src}" width="30">`;
    document.getElementById('charList').appendChild(box);
});

if(localStorage.getItem('pookie_user')) showMenu();
window.toggleTheme = function() { 
    state.theme = state.theme === 'light' ? 'dark' : 'light'; 
    document.body.setAttribute('data-theme', state.theme); 
};
</script>

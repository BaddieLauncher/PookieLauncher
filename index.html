<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Pookie Launcher | Rai Daim Pro</title>
<style>
    :root { --primary: #ff1493; --bg: #0f0c29; --card: rgba(0, 0, 0, 0.45); --admin: #9b59b6; --white-glow: 0 0 15px rgba(255, 255, 255, 0.6); }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: #000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; touch-action: none; }
    #game-container { position: relative; width: 360px; height: 640px; background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 0 50px rgba(255, 20, 147, 0.4); border: 2px solid white; }
    canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; }
    .overlay { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index: 50; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://i.ibb.co/y1bzDbb/1775837070550.png'); background-size: cover; background-position: center; backdrop-filter: blur(12px); text-align: center; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    .avatar-wrapper { position: relative; animation: float 3s ease-in-out infinite; }
    #charAvatar { width:95px; height:95px; border-radius:50%; border:3px solid white; background: rgba(255,255,255,0.2); box-shadow: 0 0 20px white; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
    .btn { position: relative; overflow: hidden; background: var(--primary); color: white; border: 2px solid white; padding: 10px 20px; font-weight: 800; border-radius: 50px; cursor: pointer; font-size: 12px; margin-top: 5px; width: 80%; transition: 0.3s; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4); }
    .btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shine 3.5s infinite; }
    input { margin:8px 0; padding:12px; border-radius:12px; border: 2px solid white; width:75%; outline: none; text-align: center; font-weight: bold; background: rgba(255,255,255,0.9); }
    #hud { position: absolute; top: 30px; width: 100%; display: none; justify-content: space-between; z-index: 10; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
    #lb-box { width: 85%; margin-top:15px; height: 110px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; border: 2px solid white; color: white; }
    #chat-box { position: absolute; bottom: 85px; right: 15px; width: 220px; height: 200px; background: rgba(255,255,255,0.95); border-radius: 15px; display: none; flex-direction: column; z-index: 60; border: 2px solid white; }
    #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; color: #000; text-align: left; }
    #muteBtn { position: absolute; bottom: 25px; left: 25px; width: 50px; height: 50px; border-radius: 50%; background: #333; color: white; border: 2px solid white; font-size: 20px; z-index: 60; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; }
    #respawn-timer { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 80px; font-weight: 900; z-index: 100; display: none; text-shadow: 0 0 20px var(--primary); }
</style>
</head>
<body>

<div id="game-container">
    <div id="global-alert" style="border: 2px solid white; background: var(--primary); color: white; padding: 10px; border-radius: 12px; position: absolute; top: 80px; width: 90%; left: 5%; z-index: 100; display: none; text-align: center;">📢 ADMIN: <span id="alert-text"></span></div>
    <div id="hud">
        <div id="scoreDisplay" style="font-size: 30px; font-weight: 900; color: white; text-shadow: 2px 2px #ff1493, 0 0 10px white;">0</div>
        <div id="coinDisplay" style="font-size: 30px; font-weight: 900; color: gold; text-shadow: 2px 2px #000, 0 0 10px white;">0</div>
    </div>
    <div id="respawn-timer">3</div>
    <canvas id="game"></canvas>

    <div id="loginPage" class="overlay">
        <h1 style="color:white; margin:0; font-size: 45px; text-shadow: 0 0 20px var(--primary), 0 0 5px white;">POOKIE</h1>
        <input id="uIn" type="text" placeholder="Your Nickname">
        <button class="btn" onclick="login()">Enter Arena</button>
    </div>

    <div id="startMenu" class="overlay" style="display:none;">
        <div id="adminBtn" onclick="openAdmin()" style="display:none; position:absolute; top:20px; left:20px; color:var(--admin); cursor:pointer; font-size:28px; filter: drop-shadow(0 0 5px white);">👑</div>
        <div style="position:absolute; top:25px; right:20px; display:flex; gap:5px;">
            <div onclick="changeUsername()" style="color:white; cursor:pointer; font-weight:bold; font-size:10px; border:2px solid white; padding:5px; border-radius:8px; background:rgba(0,0,0,0.5);">EDIT NAME</div>
            <div onclick="logout()" style="color:white; cursor:pointer; font-weight:bold; font-size:10px; border:2px solid white; padding:5px; border-radius:8px; background:rgba(255,0,0,0.5);">LOGOUT</div>
        </div>
        <div style="background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 20px; margin-bottom: 10px; border: 2px solid white;">
            <h2 style="color:gold; margin:0; font-size: 22px; text-shadow: 0 0 5px white;">💰 <span id="totalCoinsDisplay">0</span></h2>
        </div>
        <div class="avatar-wrapper" style="display:flex; align-items:center; gap:20px; margin: 15px;">
            <button onclick="changeChar(-1)" style="font-size:40px; background:none; border:none; color:white; text-shadow: 0 0 10px white; cursor:pointer;">◀</button>
            <img id="charAvatar" src="">
            <button onclick="changeChar(1)" style="font-size:40px; background:none; border:none; color:white; text-shadow: 0 0 10px white; cursor:pointer;">▶</button>
        </div>
        <button class="btn" onclick="startGame(false)">Solo Play</button>
        <button class="btn" onclick="openMultiMenu()" style="background:#3498db">Multiplayer Mode</button>
        <div id="lb-box"><div id="leaderboardList" style="padding: 5px;"></div></div>
    </div>

    <div id="multiMenu" class="overlay" style="display:none;">
        <h2 style="color:white; text-shadow: 0 0 10px white;">ROOM SYSTEM</h2>
        <input id="roomIn" type="text" placeholder="Enter Room Code">
        <button class="btn" onclick="joinRoomAction()" style="background:#2ecc71">Join Room</button>
        <button class="btn" onclick="createRoomAction()" style="background:#f39c12">Host Room</button>
        <button class="btn" onclick="showMenu()" style="background:#999">Back</button>
    </div>

    <div id="roomLobby" class="overlay" style="display:none; padding: 10px;">
        <div id="displayRoomCode" style="font-size:40px; font-weight:900; color:white; text-shadow: 0 0 20px white; margin:5px;">0000</div>
        <p id="playerCount" style="color:white; font-weight:bold; margin:5px;">Waiting...</p>
        
        <button class="btn" id="startBtn" onclick="hostStartGame()" style="background:#2ecc71; display:none;">START MATCH</button>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 90%;">
            <button class="btn" onclick="shareSocial('wa')" style="background:#25D366; width:100%;">WhatsApp</button>
            <button class="btn" onclick="shareSocial('fb')" style="background:#1877F2; width:100%;">Facebook</button>
            <button class="btn" onclick="shareSocial('ig')" style="background:#C13584; width:100%;">Instagram</button>
            <button class="btn" onclick="shareSocial('snap')" style="background:#FFFC00; color:black; width:100%;">Snapchat</button>
        </div>
        
        <button class="btn" onclick="leaveRoom()" style="background:#e74c3c; margin-top:10px;">Leave</button>
    </div>

    <div id="chat-box">
        <div id="chat-msgs"></div>
        <div style="display:flex; padding:5px; border-top: 1px solid #ddd;">
            <input id="cIn" style="flex:1; padding:5px; border:1px solid #ff1493; border-radius:5px;" placeholder="Hey!">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; border-radius:5px; padding:0 10px; margin-left:5px;">🚀</button>
        </div>
    </div>
    <button onclick="toggleChat()" style="position:absolute; bottom:25px; right:25px; width:55px; height:55px; border-radius:50%; background:var(--primary); color:white; border:3px solid white; font-size:25px; z-index:60; cursor:pointer;">💬</button>
    <button id="muteBtn" onclick="toggleMute()">🔊</button>
</div>

<div id="adminPanel" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; background: white; padding: 20px; border-radius: 25px; z-index: 200; border: 3px solid var(--admin);">
    <h3 style="text-align:center;">👑 MASTER CONTROL</h3>
    <input id="adminMsgIn" type="text" placeholder="Alert message...">
    <button class="btn" onclick="pushGlobalAlert()" style="background:red; border: 2px solid white; width:100%;">Push Alert</button>
    
    <div style="margin-top:10px; border-top: 1px solid #ccc; padding-top:10px;">
        <input id="rainInput" type="text" placeholder="Emoji/Text for Rain">
        <button class="btn" onclick="triggerRain()" style="background:#9b59b6; border: 2px solid white; width:100%;">Start Rain 🌧️</button>
        <button class="btn" onclick="stopRain()" style="background:#555; border: 2px solid white; width:100%;">Stop Rain</button>
    </div>

    <hr><input id="kickIn" type="text" placeholder="Username to remove...">
    <button class="btn" onclick="kickUser()" style="background:black; border: 2px solid white; width:100%;">Remove User</button>
    <button class="btn" onclick="closeAdmin()" style="background:#333; border: 2px solid white; width:100%;">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, get, query, orderByChild, limitToLast, onDisconnect, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const conf = { apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc", databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com" };
const app = initializeApp(conf); const db = getDatabase(app);
const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 640;

const bgMusic = new Audio('https://files.catbox.moe/yjeo65.mp3'); bgMusic.loop = true;
const coinSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

let currentRoom = null; let isHost = false; let others = {}; let isMultiplayer = false; let isMuted = false;
let rainText = null; let rainParticles = [];
const assets = { chars: ["https://i.ibb.co/4nZsqPZn/IMG-20260403-WA0258-removebg-preview.png","https://i.ibb.co/KcbN4WFM/IMG-20260403-WA0256-removebg-preview.png","https://i.ibb.co/zV9QR1R1/IMG-20260403-WA0257-removebg-preview.png","https://i.ibb.co/3yQFCm0W/IMG-20260403-WA0259-removebg-preview.png","https://i.ibb.co/XZT4pj5r/1775227244228-removebg-preview.png"], bg: "https://i.ibb.co/PsXKrn2S/1775227599134.png", coin: "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png" };
let birdImg = new Image(); let bgImg = new Image(); bgImg.src = assets.bg; let coinImg = new Image(); coinImg.src = assets.coin;
let st = { active: false, dead: false, score: 0, frame: 0, bX: 0, bird: { x: 80, y: 300, v: 0, g: 0.25 }, pipes: [], gameCoins: [], charIndex: 0, gameSpeed: 2.5 };
const MY_NAME = "Rai Daim";

window.onload = () => { if(localStorage.getItem('pUser')) showMenu(); };
window.login = () => { const n = document.getElementById('uIn').value.trim(); if(n.length>1){ localStorage.setItem('pUser', n); showMenu(); } else { alert("Enter valid name"); } };
window.logout = () => { localStorage.removeItem('pUser'); location.reload(); };
window.changeUsername = () => { const n = prompt("Enter new nickname:", localStorage.getItem('pUser')); if(n && n.length > 1) { localStorage.setItem('pUser', n); showMenu(); } };
window.showMenu = () => { const user = localStorage.getItem('pUser'); document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none'); document.getElementById('startMenu').style.display = 'flex'; document.getElementById('hud').style.display = 'none'; const uKey = user.replace(/\W/g,''); if(user === MY_NAME) document.getElementById('adminBtn').style.display = 'block'; onValue(ref(db, `users/${uKey}/coins`), s => { document.getElementById('totalCoinsDisplay').innerText = s.val() || 0; document.getElementById('coinDisplay').innerText = s.val() || 0; }); syncLB(); updateCharUI(); };

onValue(ref(db, 'adminRain'), s => { rainText = s.val(); });

window.startGame = (multi) => { isMultiplayer = multi; document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none'); document.getElementById('hud').style.display = 'flex'; birdImg.src = assets.chars[st.charIndex]; resetGameLogic(); loop(); };
function resetGameLogic() { st.active = true; st.dead = false; st.score = 0; st.frame = 0; st.pipes = []; st.gameCoins = []; st.bird.y = 300; st.bird.v = 0; st.gameSpeed = 2.5; document.getElementById('scoreDisplay').innerText = "0"; rainParticles = []; }

function loop() { if(!st.active) return; ctx.clearRect(0,0,360,640); st.bX -= st.gameSpeed; ctx.drawImage(bgImg, st.bX, 0, 360, 640); ctx.drawImage(bgImg, st.bX+360, 0, 360, 640); if(st.bX<=-360) st.bX=0; 
    if(rainText) {
        if(st.frame % 5 === 0) rainParticles.push({x: Math.random()*360, y: -20, s: 2+Math.random()*3});
        ctx.fillStyle = "white"; ctx.font = "20px Arial";
        rainParticles.forEach((rp, i) => { rp.y += rp.s; ctx.fillText(rainText, rp.x, rp.y); if(rp.y > 640) rainParticles.splice(i, 1); });
    }
    if(!st.dead) { st.gameSpeed = 2.5 + (st.score * 0.02); st.bird.v += st.bird.g; st.bird.y += st.bird.v; if(st.frame % 100 === 0) { let py = Math.random() * 250 + 100; st.pipes.push({ x: 360, y: py, passed: false }); if(Math.random() > 0.6) st.gameCoins.push({ x: 380, y: py + 80, collected: false }); } } 
    st.gameCoins.forEach(c => { if(!st.dead) c.x -= st.gameSpeed; if(!c.collected) { ctx.drawImage(coinImg, c.x, c.y, 30, 30); if(Math.hypot(st.bird.x-c.x, st.bird.y-c.y) < 35) { c.collected=true; addCoin(5); } } }); 
    st.pipes.forEach(p => { if(!st.dead) p.x -= st.gameSpeed; ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, 0, 52, p.y); ctx.fillRect(p.x, p.y + 180, 52, 640); if(!st.dead && st.bird.x+15 > p.x && st.bird.x-15 < p.x+52 && (st.bird.y-15 < p.y || st.bird.y+15 > p.y+180)) die(); if(!p.passed && p.x < st.bird.x) { p.passed=true; st.score++; document.getElementById('scoreDisplay').innerText = st.score; } }); 
    ctx.drawImage(birdImg, st.bird.x-25, st.bird.y-25, 50, 50); if(!st.dead && (st.bird.y > 640 || st.bird.y < 0)) die(); if(!st.dead) st.frame++; requestAnimationFrame(loop); 
}

function die() { if(st.dead) return; st.dead = true; setTimeout(() => { st.active = false; showMenu(); }, 1200); }
function addCoin(val) { const uKey = localStorage.getItem('pUser').replace(/\W/g,''); get(ref(db, `users/${uKey}/coins`)).then(s => { set(ref(db, `users/${uKey}/coins`), (s.val()||0)+val); if(!isMuted) { coinSnd.currentTime = 0; coinSnd.play(); } }); }

window.shareSocial = (type) => { 
    const msg = `Join my Pookie Launcher Room! Code: ${currentRoom} \nPlay: ${window.location.href}`; 
    let url = "";
    if(type === 'wa') url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
    else if(type === 'fb') url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(msg)}`;
    else if(type === 'ig' || type === 'snap') { alert("Link copied! Share it on " + type); navigator.clipboard.writeText(msg); return; }
    window.open(url);
};

window.createRoomAction = () => { isHost = true; joinRoom(Math.floor(1000 + Math.random() * 9000)); };
window.joinRoomAction = () => { const c = document.getElementById('roomIn').value; if(c) joinRoom(c); };
function joinRoom(code) { currentRoom = code; document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none'); document.getElementById('roomLobby').style.display = 'flex'; document.getElementById('displayRoomCode').innerText = code; if(isHost) document.getElementById('startBtn').style.display = "block"; }

window.hostStartGame = () => { set(ref(db, `rooms/${currentRoom}/start`), true); };
onValue(ref(db, `rooms/${currentRoom}/start`), s => { if(s.val() === true) startGame(true); });

window.openMultiMenu = () => { document.getElementById('startMenu').style.display = 'none'; document.getElementById('multiMenu').style.display = 'flex'; };
window.toggleChat = () => { const c = document.getElementById('chat-box'); c.style.display = c.style.display==='flex'?'none':'flex'; };
window.sendMsg = () => { const i = document.getElementById('cIn'); if(i.value) push(ref(db, 'globalChat'), { u: localStorage.getItem('pUser'), m: i.value }); i.value = ''; };
onValue(query(ref(db, 'globalChat'), limitToLast(10)), s => { const l = document.getElementById('chat-msgs'); l.innerHTML = ''; s.forEach(x => { const d = x.val(); l.innerHTML += `<div><b>${d.u}:</b> ${d.m}</div>`; }); l.scrollTop = l.scrollHeight; });

function syncLB() { onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(10)), s => { let h = '<b style="color: gold;">🏆 RANKINGS</b>'; let arr = []; s.forEach(x => { arr.push({n: x.key, c: x.val().coins || 0}); }); arr.sort((a,b) => b.c - a.c).forEach((p, i) => h += `<div style="display:flex; justify-content:space-between; font-size:11px;"><span>${i+1}. ${p.n}</span><b>${p.c}</b></div>`); document.getElementById('leaderboardList').innerHTML = h; }); }
window.changeChar = (dir) => { st.charIndex = (st.charIndex + dir + assets.chars.length) % assets.chars.length; updateCharUI(); };
function updateCharUI() { document.getElementById('charAvatar').src = assets.chars[st.charIndex]; }
window.toggleMute = () => { isMuted = !isMuted; bgMusic.muted = isMuted; if(isMuted) bgMusic.pause(); else bgMusic.play(); document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊'; };

// IPHONE TOUCH EVENT ADDED (Fixes iPhone responsiveness)
window.addEventListener('touchstart', (e) => { 
    if(st.active && !st.dead && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') { 
        st.bird.v = -5.5; 
        if(!isMuted) bgMusic.play(); 
    } 
}, {passive: false});

// Kept existing mousedown for desktop compatibility
window.addEventListener('mousedown', (e) => { if(st.active && !st.dead && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') { st.bird.v = -5.5; if(!isMuted) bgMusic.play(); } });

window.openAdmin = () => document.getElementById('adminPanel').style.display='block';
window.closeAdmin = () => document.getElementById('adminPanel').style.display='none';
window.pushGlobalAlert = () => { set(ref(db, 'adminAlert'), document.getElementById('adminMsgIn').value); };
window.triggerRain = () => { set(ref(db, 'adminRain'), document.getElementById('rainInput').value); };
window.stopRain = () => { set(ref(db, 'adminRain'), null); };
window.kickUser = () => { const u = document.getElementById('kickIn').value.trim(); if(u) { remove(ref(db, 'users/' + u.replace(/\W/g,''))); alert("Removed!"); } };
</script>
</body>
</html>

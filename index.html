<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Pookie Launcher | Rai Daim Pro</title>
<style>
    :root { --primary: #ff1493; --bg: #fdf2f5; --card: rgba(255, 255, 255, 0.4); --text: #444; --border: rgba(255, 255, 255, 0.6); --admin: #9b59b6; }
    [data-theme="dark"] { --bg: #121212; --card: rgba(0, 0, 0, 0.6); --text: #eee; --border: rgba(255, 255, 255, 0.1); }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; touch-action: none; transition: 0.5s ease; }
    
    @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } 75% { transform: translate(-5px, -5px); } }
    .shake-active { animation: shake 0.2s ease-in-out infinite; }
    canvas { border-radius: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); background: #fff; }

    .overlay { position:absolute; width:360px; height:640px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:24px; z-index: 10; background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); color: var(--text); }
    
    .coin-stats { background: rgba(255, 215, 0, 0.2); padding: 8px 15px; border-radius: 15px; border: 1px solid gold; margin-bottom: 10px; text-align: center; }
    .theme-switch { position: absolute; top: 20px; right: 20px; background: var(--primary); color: white; padding: 6px 12px; border-radius: 20px; font-size: 10px; border: none; cursor:pointer; }
    
    input { margin:5px 0; padding:10px; border-radius:12px; border: 1px solid var(--primary); width:70%; font-size:14px; outline: none; }
    .btn { background: var(--primary); color: white; border:none; padding:12px 35px; font-size:16px; font-weight:700; border-radius:50px; cursor:pointer; margin-top: 10px; }

    /* Chat System */
    #chat-container { position: absolute; bottom: 80px; right: 20px; width: 280px; height: 300px; background: var(--card); backdrop-filter: blur(15px); border-radius: 15px; display: none; flex-direction: column; z-index: 20; border: 1px solid var(--border); overflow: hidden; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
    .msg { margin-bottom: 8px; padding: 5px 8px; border-radius: 8px; background: rgba(255,255,255,0.4); }
    .msg-admin { border-left: 3px solid var(--admin); background: rgba(155, 89, 182, 0.1); }
    .msg-tag { font-size: 9px; font-weight: bold; text-transform: uppercase; margin-right: 5px; }
    .chat-input-area { display: flex; padding: 5px; background: rgba(255,255,255,0.2); }
    #chat-input { flex: 1; border: none; padding: 8px; border-radius: 5px; font-size: 12px; margin: 0; width: auto; }
    #chat-toggle { position: absolute; bottom: 20px; right: 20px; z-index: 21; background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    /* Admin Panel */
    #adminPanel { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; background: white; padding: 20px; border-radius: 20px; z-index: 100; color: #333; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
    .admin-btn { background: var(--admin); color: white; padding: 8px; width: 100%; border: none; border-radius: 5px; margin-top: 5px; cursor: pointer; font-weight: bold; }

    .char-container { display:flex; gap:8px; margin: 10px 0; flex-wrap: wrap; justify-content: center; width: 90%; }
    .char-box { width:45px; height:45px; border-radius:12px; background: rgba(255,255,255,0.3); cursor:pointer; display:flex; justify-content:center; align-items:center; border: 2px solid transparent; }
    .char-box.selected { border-color: var(--primary); background: #fff; }
    
    #hud { position: absolute; top: 40px; width: 300px; display: none; justify-content: space-between; z-index: 5; pointer-events: none; }
    .stat-val { color: #fff; font-size: 32px; font-weight: 900; text-shadow: 2px 2px 0 var(--primary); }
</style>
</head>
<body>

<div id="hud">
    <div><div style="font-size:10px; color:#fff;">SCORE</div><div id="scoreDisplay" class="stat-val">0</div></div>
    <div style="text-align:right;"><div style="font-size:10px; color:#fff;">COINS</div><div id="coinDisplay" class="stat-val" style="color:#ffd700">0</div></div>
</div>

<div id="loginPage" class="overlay">
    <div style="font-size:40px; font-weight:900; color:var(--primary);">POOKIE</div>
    <input id="username" type="text" placeholder="Enter Nickname">
    <button class="btn" onclick="login()">LOGIN</button>
</div>

<div id="startMenu" class="overlay" style="display:none;">
    <button class="theme-switch" onclick="toggleTheme()">THEME</button>
    <div id="adminAccessBtn" onclick="openAdmin()" style="display:none; position:absolute; top:20px; left:20px; font-size:10px; color:var(--admin); cursor:pointer; font-weight:bold; background:white; padding:5px; border-radius:5px; border:1px solid var(--admin)">👑 ADMIN</div>
    
    <div class="coin-stats" style="margin-top: 20px;">
        <div style="font-size: 9px; font-weight: 800; color: #b8860b;">TOTAL WALLET</div>
        <div id="totalCoinsMenu" style="font-size: 22px; font-weight: 900; color: #d4af37;">0</div>
    </div>

    <div class="char-container" id="charList"></div>
    <button class="btn" onclick="startGame()">PLAY GAME</button>
    
    <div id="scoreboard" style="width:80%; font-size:12px; margin-top:10px;">
        <div style="text-align:center; font-weight:bold; color:var(--primary)">TOP PLAYERS</div>
        <div id="leaderboardList"></div>
    </div>
    <div onclick="logout()" style="color:#aaa; font-size:10px; margin-top:15px; cursor:pointer; text-decoration: underline;">Logout</div>
</div>

<div id="adminPanel">
    <h3 style="margin-top:0; color:var(--admin)">Admin Control</h3>
    <input id="targetUser" type="text" placeholder="Target Nickname">
    <input id="coinAmount" type="number" placeholder="Coins to Add">
    <button class="admin-btn" onclick="adminGiveCoins()">Send Coins</button>
    <hr>
    <input id="announcementMsg" type="text" placeholder="Announcement Message">
    <button class="admin-btn" onclick="adminAnnounce()">Broadcast Alert</button>
    <hr>
    <input id="djUrl" type="text" placeholder="Direct .mp3 URL">
    <button class="admin-btn" onclick="adminDJ()">DJ: Play & Shake</button>
    <button class="admin-btn" style="background:#e67e22" onclick="adminCoinRain()">Trigger Coin Rain</button>
    <button class="admin-btn" style="background:#333; margin-top:15px" onclick="closeAdmin()">Close</button>
</div>

<button id="chat-toggle" onclick="toggleChat()">💬</button>
<div id="chat-container">
    <div style="background:var(--primary); color:white; padding:10px; font-size:12px; font-weight:bold; display:flex; justify-content:space-between">
        <span>GLOBAL CHAT</span>
        <span onclick="toggleChat()" style="cursor:pointer">✖</span>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Say something...">
        <button onclick="sendChatMessage()" style="border:none; background:none; cursor:pointer; font-size:16px">🚀</button>
    </div>
</div>

<canvas id="game"></canvas>

<audio id="audJump" src="https://files.catbox.moe/gdwkxz.mp3" preload="auto"></audio>
<audio id="audPoint" src="https://files.catbox.moe/vyrwbo.mp3" preload="auto"></audio>
<audio id="audHit" src="https://files.catbox.moe/tc5gl1.mp3" preload="auto"></audio>
<audio id="audScream" src="https://files.catbox.moe/tkzhsm.wav" preload="auto"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast, push, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc",
  authDomain: "karbala-2fcca.firebaseapp.com",
  databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com",
  projectId: "karbala-2fcca",
  storageBucket: "karbala-2fcca.firebasestorage.app",
  messagingSenderId: "407029541851",
  appId: "1:407029541851:web:068acb3c40e63b92af15fe"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Game Settings
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 640;

const assets = {
    chars: [
        "https://i.ibb.co/4nZsqPZn/IMG-20260403-WA0258-removebg-preview.png",
        "https://i.ibb.co/KcbN4WFM/IMG-20260403-WA0256-removebg-preview.png",
        "https://i.ibb.co/zV9QR1R1/IMG-20260403-WA0257-removebg-preview.png",
        "https://i.ibb.co/3yQFCm0W/IMG-20260403-WA0259-removebg-preview.png",
        "https://i.ibb.co/XZT4pj5r/1775227244228-removebg-preview.png"
    ],
    bg: "https://i.ibb.co/PsXKrn2S/1775227599134.png",
    coin: "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png"
};

let birdImg = new Image(); birdImg.src = assets.chars[0];
let bgImg = new Image(); bgImg.src = assets.bg;
let coinImg = new Image(); coinImg.src = assets.coin;

let state = {
    active: false, dead: false, score: 0, coinsInRun: 0, frame: 0, bgX: 0, speed: 3.2,
    bird: { x: 85, y: 320, w: 55, h: 55, v: 0, g: 0.27, jump: -6 },
    pipes: [], coins: [], theme: 'light', lastChat: 0, isRain: false
};

const ADMIN_NAME = "Rai Daim";

function playSfx(id) {
    const s = document.getElementById(id);
    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
}

// User Logic
window.login = function() {
    const name = document.getElementById('username').value.trim();
    if(name.length < 2) return;
    localStorage.setItem('pookie_user', name);
    const key = name.replace(/\W/g, '');
    update(ref(db, 'users/' + key), { name: name, lastSeen: serverTimestamp() });
    showMenu();
};

window.logout = function() { localStorage.clear(); location.reload(); };

window.showMenu = function() {
    const user = localStorage.getItem('pookie_user');
    if(!user) return;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('startMenu').style.display = 'flex';
    if(user === ADMIN_NAME) document.getElementById('adminAccessBtn').style.display = 'block';
    
    onValue(ref(db, 'users/' + user.replace(/\W/g, '') + '/coins'), (s) => {
        const val = s.val() || 0;
        document.getElementById('totalCoinsMenu').innerText = val;
        localStorage.setItem('pookie_total_coins', val);
    });
    syncLeaderboard();
};

window.startGame = function() {
    document.getElementById('startMenu').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    state.bird.y = 320; state.bird.v = 0; state.score = 0; state.coinsInRun = 0;
    state.pipes = []; state.coins = []; state.dead = false; state.frame = 0;
    state.active = true;
    loop();
};

// Chat Logic
window.toggleChat = () => {
    const c = document.getElementById('chat-container');
    c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
};

window.sendChatMessage = () => {
    const user = localStorage.getItem('pookie_user');
    const input = document.getElementById('chat-input');
    if(!input.value.trim() || Date.now() - state.lastChat < 1000) return;
    push(ref(db, 'chat'), { user, msg: input.value, isAdmin: user === ADMIN_NAME, time: serverTimestamp() });
    input.value = ''; state.lastChat = Date.now();
};

onValue(query(ref(db, 'chat'), limitToLast(15)), (snap) => {
    const list = document.getElementById('chat-messages');
    list.innerHTML = '';
    snap.forEach(child => {
        const m = child.val();
        const div = document.createElement('div');
        div.className = `msg ${m.isAdmin ? 'msg-admin' : ''}`;
        div.innerHTML = `<span class="msg-tag" style="color:${m.isAdmin?'var(--admin)':'var(--primary)'}">${m.isAdmin?'👑':''} ${m.user}:</span> ${m.msg}`;
        list.appendChild(div);
    });
    list.scrollTop = list.scrollHeight;
});

// Admin Control Logic
window.openAdmin = () => document.getElementById('adminPanel').style.display = 'block';
window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

window.adminGiveCoins = () => {
    const target = document.getElementById('targetUser').value.replace(/\W/g, '');
    const amt = parseInt(document.getElementById('coinAmount').value);
    if(!target || isNaN(amt)) return;
    const userRef = ref(db, 'users/' + target + '/coins');
    onValue(userRef, (s) => {
        update(ref(db, 'users/' + target), { coins: (s.val() || 0) + amt });
    }, {onlyOnce: true});
    alert("Sent " + amt + " coins to " + target);
};

window.adminAnnounce = () => {
    const msg = document.getElementById('announcementMsg').value;
    set(ref(db, 'global_event/announcement'), { text: msg, time: Date.now() });
};

window.adminDJ = () => {
    const url = document.getElementById('djUrl').value;
    set(ref(db, 'global_event/dj'), { url, time: Date.now() });
};

window.adminCoinRain = () => {
    set(ref(db, 'global_event/rain'), { active: true, time: Date.now() });
};

// Listening for Admin Events
onValue(ref(db, 'global_event/announcement'), (s) => {
    const data = s.val();
    if(data && Date.now() - data.time < 5000) alert("📢 ALERT: " + data.text);
});

onValue(ref(db, 'global_event/dj'), (s) => {
    const data = s.val();
    if(data && Date.now() - data.time < 5000) {
        const audio = new Audio(data.url);
        audio.play().catch(()=>{});
        canvas.classList.add('shake-active');
        setTimeout(() => canvas.classList.remove('shake-active'), 8000);
    }
});

onValue(ref(db, 'global_event/rain'), (s) => {
    const data = s.val();
    if(data && state.active) state.isRain = true;
});

// Main Loop
function loop() {
    if(!state.active) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    state.bgX -= state.speed * 0.4; if(state.bgX <= -canvas.width) state.bgX = 0;
    ctx.drawImage(bgImg, state.bgX, 0, canvas.width, canvas.height);
    ctx.drawImage(bgImg, state.bgX + canvas.width, 0, canvas.width, canvas.height);

    if(!state.dead) {
        state.bird.v += state.bird.g; state.bird.y += state.bird.v;
        if(state.frame % 90 === 0) {
            const h = Math.random() * (canvas.height - 400) + 100;
            state.pipes.push({ x: canvas.width, y: h, w: 75, gap: 195, passed: false });
            state.coins.push({ x: canvas.width + 120, y: h + 100, collected: false });
        }
        if(state.isRain && state.frame % 10 === 0) state.coins.push({ x: Math.random()*canvas.width, y: -20, collected: false, rain: true });
    }

    state.pipes.forEach(p => {
        p.x -= state.speed; 
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, 0, p.w, p.y); ctx.fillRect(p.x, p.y + 195, p.w, canvas.height);
        if(!state.dead && state.bird.x+18 > p.x && state.bird.x-18 < p.x+p.w) {
            if(state.bird.y-18 < p.y || state.bird.y+18 > p.y+195) triggerDie();
        }
        if(!p.passed && p.x + p.w < state.bird.x) { p.passed = true; state.score++; document.getElementById('scoreDisplay').innerText = state.score; playSfx('audPoint'); }
    });

    state.coins.forEach(c => {
        if(c.rain) c.y += 6; else c.x -= state.speed;
        if(!c.collected) {
            ctx.drawImage(coinImg, c.x-17, c.y-17, 35, 35);
            if(Math.hypot(state.bird.x - c.x, state.bird.y - c.y) < 38) {
                c.collected = true; state.coinsInRun += 5;
                document.getElementById('coinDisplay').innerText = state.coinsInRun;
                playSfx('audPoint');
            }
        }
    });

    ctx.save(); ctx.translate(state.bird.x, state.bird.y); 
    ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, state.bird.v * 0.1)));
    ctx.drawImage(birdImg, -state.bird.w/2, -state.bird.h/2, state.bird.w, state.bird.h);
    ctx.restore();

    if(!state.dead && (state.bird.y > canvas.height || state.bird.y < 0)) triggerDie();
    state.frame++; requestAnimationFrame(loop);
}

function triggerDie() {
    if(state.dead) return; state.dead = true;
    playSfx('audHit'); setTimeout(() => playSfx('audScream'), 300);
    const user = localStorage.getItem('pookie_user').replace(/\W/g, '');
    const total = parseInt(localStorage.getItem('pookie_total_coins') || 0);
    update(ref(db, 'users/' + user), { coins: total + state.coinsInRun });
    setTimeout(() => { state.active = false; state.isRain = false; showMenu(); document.getElementById('hud').style.display = 'none'; }, 1500);
}

function jump() { if(state.active && !state.dead) { state.bird.v = state.bird.jump; playSfx('audJump'); } }
canvas.addEventListener('touchstart', e => { jump(); e.preventDefault(); }, {passive: false});
window.addEventListener('mousedown', () => { if(state.active) jump(); });

function syncLeaderboard() {
    onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(5)), (s) => {
        const list = document.getElementById('leaderboardList');
        list.innerHTML = '';
        let items = [];
        s.forEach(c => { items.push(c.val()); });
        items.reverse().forEach((u, i) => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:3px; border-bottom:1px solid rgba(0,0,0,0.05)"><span>${i+1}. ${u.name}</span><span>💰 ${u.coins}</span></div>`;
        });
    });
}

// Init Chars
assets.chars.forEach((src, i) => {
    const box = document.createElement('div');
    box.className = `char-box ${i===0?'selected':''}`;
    box.onclick = () => {
        birdImg.src = assets.chars[i];
        document.querySelectorAll('.char-box').forEach(b => b.classList.remove('selected'));
        box.classList.add('selected');
        playSfx('audJump');
    };
    box.innerHTML = `<img src="${src}" width="30">`;
    document.getElementById('charList').appendChild(box);
});

if(localStorage.getItem('pookie_user')) showMenu();
window.toggleTheme = function() { 
    state.theme = state.theme === 'light' ? 'dark' : 'light'; 
    document.body.setAttribute('data-theme', state.theme); 
};
</script>
</body>
</html>

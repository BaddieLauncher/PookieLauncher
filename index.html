<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Baddie Launcher Pro Ultimate</title>
<style>
body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { border-radius: 15px; box-shadow: 0 0 60px rgba(255, 20, 147, 0.5); touch-action: manipulation; }
.overlay { position: absolute; width: 360px; height: 640px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; backdrop-filter: blur(6px); border-radius: 20px; box-shadow: 0 8px 20px rgba(255,20,147,0.4); }
#startMenu { background: linear-gradient(rgba(255,182,193,0.9), rgba(255,20,147,0.5)); border-radius: 20px; padding: 20px; }
.title-text { font-size: 50px; color: #fff; font-weight: 900; text-shadow: 5px 5px 0px #ff1493, 8px 8px 0px rgba(0,0,0,0.15); margin-bottom: 40px; letter-spacing: -2px; }
.btn { background: #fff; color: #ff1493; border: none; padding: 18px 60px; font-size: 24px; font-weight: bold; border-radius: 60px; cursor: pointer; box-shadow: 0 10px 0px #ff85a2; transition: 0.25s; text-transform: uppercase; letter-spacing: 1px; }
.btn:hover { transform: scale(1.08); box-shadow: 0 12px 0px #ff85a2; }
.btn:active { transform: translateY(5px); box-shadow: 0 6px 0px #ff85a2; }
#scoreDisplay, #highScoreDisplay { position: absolute; font-size: 55px; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 #ff1493, -2px -2px 0 #ff1493; z-index: 5; display: none; pointer-events: none; }
#scoreDisplay { top: 40px; left: 20px; }
#highScoreDisplay { top: 40px; right: 20px; }
#muteBtn { position: absolute; top: 20px; right: 20px; z-index: 10; background: #fff; color: #ff1493; border-radius: 50px; padding: 12px 24px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 5px 0px #ff85a2; transition: 0.2s; }
#muteBtn:hover { transform: scale(1.05); }
</style>
</head>
<body><div id="scoreDisplay">0</div>
<div id="highScoreDisplay">0</div>
<div id="startMenu" class="overlay">
<div class="title-text">BADDIE<br>LAUNCHER</div>
<img src="https://i.ibb.co/NgGDBgcr/1775128705992-removebg-preview.png" width="140" style="margin-bottom: 50px; filter: drop-shadow(0 12px 12px rgba(0,0,0,0.3));">
<button class="btn" onclick="initGame()">LAUNCH</button>
</div>
<button id="muteBtn" onclick="toggleMute()">🔊 Mute</button>
<canvas id="game"></canvas><audio id="sScream" src="https://files.catbox.moe/tkzhsm.wav"></audio> <audio id="sHit" src="https://files.catbox.moe/tc5gl1.mp3"></audio> <audio id="sJump" src="https://files.catbox.moe/ikx4os.mp3"></audio> <audio id="sPoint" src="https://files.catbox.moe/u8ig6t.mp3"></audio> <audio id="bgMusic" src="https://files.catbox.moe/example_music.mp3" loop></audio>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreUI = document.getElementById('scoreDisplay');
const highScoreUI = document.getElementById('highScoreDisplay');
canvas.width = 360; canvas.height = 640;

const bird = new Image(); bird.src = "https://i.ibb.co/NgGDBgcr/1775128705992-removebg-preview.png";
const coin = new Image(); coin.src = "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png";
const city = new Image(); city.src = "https://i.ibb.co/gF3njnyn/1775128983181.png";

const sounds = { scream: document.getElementById('sScream'), hit: document.getElementById('sHit'), jump: document.getElementById('sJump'), point: document.getElementById('sPoint'), bg: document.getElementById('bgMusic') };
let muted = false;
function toggleMute(){ muted = !muted; document.getElementById('muteBtn').innerText = muted ? '🔇 Muted' : '🔊 Mute'; if(muted){ sounds.bg.pause(); } else if(state.active){ sounds.bg.play(); }}

let state = { bird:{x:80,y:300,w:65,h:65,v:0,g:0.22,jump:-5.2}, pipes:[], coins:[], particles:[], score:0, bgX:0, active:false, frame:0, highScore:localStorage.getItem('highScore')||0 };
highScoreUI.innerText = state.highScore;

function initGame(){ Object.values(sounds).forEach(s=>{ s.volume=0; s.play().then(()=>{s.pause(); s.currentTime=0; s.volume=1;}).catch(()=>{}); }); document.getElementById('startMenu').style.display='none'; scoreUI.style.display='block'; highScoreUI.style.display='block'; if(!muted)sounds.bg.play(); reset(); state.active=true; loop(); }
function reset(){ state.bird.y=300; state.bird.v=0; state.score=0; state.pipes=[]; state.coins=[]; state.particles=[]; scoreUI.innerText="0"; }
function spawnPipe(){ let gap=Math.max(130,200-state.score*2); let h=Math.random()*(canvas.height-350)+100; state.pipes.push({x:canvas.width,y:h,w:75,gap:gap,passed:false}); if(Math.random()>0.4) state.coins.push({x:canvas.width+120,y:h+gap/2,w:40,collected:false}); }
function createParticles(x,y,color){for(let i=0;i<10;i++){state.particles.push({x,y,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:1,color});}} 
function loop(){ if(!state.active) return; ctx.clearRect(0,0,canvas.width,canvas.height);
 state.bgX-=1.5; if(state.bgX<=-canvas.width) state.bgX=0;
 ctx.drawImage(city,state.bgX,0,canvas.width,canvas.height);
 ctx.drawImage(city,state.bgX+canvas.width,0,canvas.width,canvas.height);
 state.bird.v+=state.bird.g; state.bird.y+=state.bird.v;
 if(state.frame%90===0) spawnPipe();
 let pipeSpeed=3.2+state.score*0.05;
 state.pipes.forEach((p,i)=>{ p.x-=pipeSpeed; ctx.fillStyle="#2ecc71"; ctx.fillRect(p.x,0,p.w,p.y); ctx.fillRect(p.x,p.y+p.gap,p.w,canvas.height); if(state.bird.x+20>p.x && state.bird.x-20<p.x+p.w){ if(state.bird.y-20<p.y || state.bird.y+20>p.y+p.gap) die(); } if(!p.passed && p.x+p.w<state.bird.x){ p.passed=true; state.score++; scoreUI.innerText=state.score; if(!muted){sounds.point.currentTime=0; sounds.point.play();}}});
 state.coins.forEach(c=>{ c.x-=pipeSpeed; if(!c.collected){ctx.drawImage(coin,c.x-c.w/2,c.y-c.w/2,c.w,c.w); if(Math.hypot(state.bird.x-c.x,state.bird.y-c.y)<40){ c.collected=true; state.score+=5; scoreUI.innerText=state.score; createParticles(c.x,c.y,"#ffd700"); if(!muted){sounds.point.currentTime=0;sounds.point.play();}}}});
 for(let i=state.particles.length-1;i>=0;i--){let p=state.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.02; ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fillRect(p.x,p.y,6,6); ctx.globalAlpha=1; if(p.life<=0) state.particles.splice(i,1);}
 ctx.save(); ctx.translate(state.bird.x,state.bird.y); ctx.rotate(Math.min(Math.PI/4,Math.max(-Math.PI/4,state.bird.v*0.1))); ctx.drawImage(bird,-state.bird.w/2,-state.bird.h/2,state.bird.w,state.bird.h); ctx.restore();
 if(state.bird.y>canvas.height||state.bird.y<0) die(); state.frame++; requestAnimationFrame(loop); }
function die(){ state.active=false; if(!muted)sounds.hit.play(); createParticles(state.bird.x,state.bird.y,"#ff1493"); setTimeout(()=>{if(!muted)sounds.scream.play();},150);
 setTimeout(()=>{document.getElementById('startMenu').style.display='flex'; scoreUI.style.display='none'; if(state.score>state.highScore){state.highScore=state.score; localStorage.setItem('highScore',state.highScore); highScoreUI.innerText=state.highScore;} if(!muted)sounds.bg.pause();},1500);}
function jump(){ if(!state.active) return; state.bird.v=state.bird.jump; if(!muted){sounds.jump.currentTime=0;sounds.jump.play();}}
window.addEventListener('keydown',e=>{if(e.code==='Space') jump();});
canvas.addEventListener('touchstart',e=>{jump(); e.preventDefault();},{passive:false});
</script></body>
</html>
